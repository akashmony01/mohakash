<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2444"/>
      <stop offset="0.55" stop-color="#10162a"/>
      <stop offset="1" stop-color="#0b0e1a"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#sky)"/>
  <!-- a scatter of stars behind the figure -->
  <circle cx="48" cy="60" r="1.6" fill="#e8eaf2" opacity="0.7"/>
  <circle cx="248" cy="44" r="1.3" fill="#7fb5e6" opacity="0.8"/>
  <circle cx="210" cy="96" r="1" fill="#e8eaf2" opacity="0.5"/>
  <circle cx="70" cy="120" r="1" fill="#e0b872" opacity="0.7"/>
  <circle cx="270" cy="150" r="1.4" fill="#e8eaf2" opacity="0.6"/>
  <circle cx="30" cy="190" r="1.1" fill="#7fb5e6" opacity="0.6"/>
  <!-- silhouette: head + shoulders -->
  <g fill="#06080f">
    <circle cx="150" cy="158" r="56"/>
    <path d="M58 400 C58 296 100 252 150 252 C200 252 242 296 242 400 Z"/>
  </g>
  <!-- thin rim light on the figure, like the sky catching an edge -->
  <path d="M96 130 a56 56 0 0 1 38 -52" fill="none" stroke="#7fb5e6" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
</svg>
