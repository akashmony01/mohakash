<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Abstract cosmic cover">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a8fd6"/>
      <stop offset="1" stop-color="#0f5f9c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#sky)"/>
  <rect width="1200" height="600" fill="url(#glow)"/>
  <g stroke="#ffffff" stroke-opacity="0.35" fill="none" stroke-width="1.2">
    <ellipse cx="600" cy="300" rx="520" ry="170" transform="rotate(-14 600 300)"/>
    <ellipse cx="600" cy="300" rx="380" ry="380"/>
    <ellipse cx="600" cy="300" rx="200" ry="470" transform="rotate(12 600 300)"/>
  </g>
  <g stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.4">
    <line x1="230" y1="150" x2="430" y2="250"/>
    <line x1="430" y1="250" x2="380" y2="430"/>
    <line x1="380" y1="430" x2="640" y2="500"/>
    <line x1="640" y1="500" x2="900" y2="360"/>
    <line x1="900" y1="360" x2="820" y2="180"/>
  </g>
  <g fill="#ffffff">
    <circle cx="230" cy="150" r="6"/>
    <circle cx="430" cy="250" r="7"/>
    <circle cx="380" cy="430" r="6"/>
    <circle cx="640" cy="500" r="7"/>
    <circle cx="900" cy="360" r="6"/>
    <circle cx="820" cy="180" r="5"/>
  </g>
  <g fill="#ffffff" fill-opacity="0.8">
    <circle cx="140" cy="480" r="2.5"/><circle cx="1040" cy="120" r="2.5"/>
    <circle cx="1080" cy="500" r="2"/><circle cx="540" cy="90" r="2"/>
    <circle cx="300" cy="540" r="2"/><circle cx="980" cy="260" r="2.2"/>
